# Supabase CLI configuration for shared-service business-state migrations.
# Runtime persistence remains disabled until each shared-service gateway is wired and tested.
project_id = "api-shared-services"

[api]
enabled = true
port = 54331
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54332
shadow_port = 54330
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false
port = 54339
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[realtime]
enabled = false

[studio]
enabled = true
port = 54333
api_url = "http://127.0.0.1"

[inbucket]
enabled = false

[storage]
enabled = false

[auth]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
