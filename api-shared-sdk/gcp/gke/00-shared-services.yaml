apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: api-center
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/component: shared-service
    app.kubernetes.io/part-of: api-center
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-service
        app.kubernetes.io/component: shared-service
        app.kubernetes.io/part-of: api-center
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: payment-service
          image: asia-southeast1-docker.pkg.dev/api-center-496422/api-center/shared-payment-service:payment-tribe-fix-50f5ee6-202605162310
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4010
          envFrom:
            - secretRef:
                name: api-shared-services-prod
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4010"
            - name: API_CENTER_URL
              value: http://api-center
            - name: SERVICE_BASE_URL
              value: http://payment-service:4010
            - name: PAYMENT_SUBSCRIPTIONS_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: api-center
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/component: shared-service
    app.kubernetes.io/part-of: api-center
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: payment-service
  ports:
    - name: http
      port: 4010
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service
  namespace: api-center
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
